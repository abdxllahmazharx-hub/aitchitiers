```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tester Panel</title>

<style>
body{
    margin:0;
    font-family: 'Inter', sans-serif;
    background:#0b0b0f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.card{
    background:#1c1c24;
    padding:30px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* INPUT */
input, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2a2a35;
    color:white;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#5c5cff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
button:hover{opacity:0.9}

.options{display:none;flex-direction:column;gap:10px}

/* POPUP */
.popup{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#1c1c24;
    padding:25px;
    border-radius:12px;
    width:320px;
}

.success{margin-top:10px;color:#00ff99}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h2>Tester Login</h2>
    <input id="pin" placeholder="Enter 4-digit PIN" maxlength="4">
    <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div class="card options" id="panel">
    <h2>Tester Panel</h2>
    <button onclick="openUpload()">Upload Result</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>Upload Result</h3>

        <input id="ign" placeholder="IGN">

        <select id="mode">
            <option value="sword">Sword</option>
            <option value="axe">Axe</option>
            <option value="nethpot">Nethpot</option>
            <option value="crystal">Crystal</option>
            <option value="uhc">UHC</option>
        </select>

        <select id="tier">
            <option>HT1</option><option>HT2</option><option>HT3</option>
            <option>HT4</option><option>HT5</option>
            <option>LT1</option><option>LT2</option><option>LT3</option>
            <option>LT4</option><option>LT5</option>
        </select>

        <button onclick="submitData()">Submit</button>
        <button onclick="closePopup()" style="background:#444;">Cancel</button>

        <div class="success" id="msg"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 YOUR FIREBASE */
const firebaseConfig = {
    apiKey: "AIzaSyDRJ9-AY5oy-oZ8ni5mWEYm2KWn72w1n3s",
    authDomain: "aitchison-tier-testing.firebaseapp.com",
    projectId: "aitchison-tier-testing",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* PIN */
const PIN = "1234";

/* LOGIN */
window.login = () => {
    if(document.getElementById("pin").value === PIN){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("panel").style.display="flex";
    }else alert("Wrong PIN");
};

/* POPUP */
window.openUpload = () => {
    document.getElementById("popup").style.display="flex";
};
window.closePopup = () => {
    document.getElementById("popup").style.display="none";
};

/* POINTS */
const tierPoints = {
    "LT5":1,"HT5":3,"LT4":5,"HT4":8,"LT3":12,
    "HT3":15,"LT2":20,"HT2":25,"LT1":30,"HT1":35
};

/* AUTO RANK */
function getRank(points){
    if(points >= 80) return "Iron";
    if(points >= 40) return "Stone";
    return "Wood";
}

/* SUBMIT */
window.submitData = async () => {
    const ign = document.getElementById("ign").value.trim();
    const mode = document.getElementById("mode").value;
    const tier = document.getElementById("tier").value;

    if(!ign) return alert("Enter IGN");

    const points = tierPoints[tier];
    const rank = getRank(points);

    try{
        await addDoc(collection(db,"submissions"),{
            ign: ign,
            mode: mode,
            tier: tier,
            points: points,
            rank: rank,
            time: serverTimestamp()
        });

        document.getElementById("msg").innerText =
            "Saved ✔ Rank: " + rank;

    }catch(e){
        alert("Error: "+e.message);
    }
};
</script>

</body>
</html>
