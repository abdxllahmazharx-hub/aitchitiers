<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tester Panel</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #0a0a0a);
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass card */
.card {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    border-radius: 25px;
    padding: 30px;
    width: 340px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    animation: fadeIn 0.6s ease;
}

h2 { text-align: center; margin-bottom: 20px; }

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 15px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
    transition: 0.2s;
}

input:focus, select:focus {
    background: rgba(255,255,255,0.15);
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(135deg, #6a5cff, #9b7bff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover { transform: scale(1.05); }

.result {
    margin-top: 12px;
    text-align: center;
    font-size: 13px;
    opacity: 0.7;
}

/* Popup */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.4s;
}

.popup-box {
    background: #111;
    padding: 30px;
    border-radius: 25px;
    width: 280px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    animation: pop 0.4s ease;
}

.popup input {
    text-align: center;
    letter-spacing: 6px;
    font-size: 18px;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 14px 20px;
    border-radius: 20px;
    color: white;
    font-size: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateY(20px);
    transition: 0.4s;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}

.toast.success { background: #2ecc71; }
.toast.error { background: #e74c3c; }

/* Animations */
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes pop {
    from {transform: scale(0.8); opacity:0;}
    to {transform: scale(1); opacity:1;}
}
</style>
</head>

<body>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- LOGIN POPUP -->
<div class="popup" id="loginPopup">
    <div class="popup-box">
        <h3>Enter PIN</h3>
        <input type="password" id="pin" maxlength="6" placeholder="••••••">
        <button onclick="checkPin()">Login</button>
    </div>
</div>

<!-- MAIN UI -->
<div class="card" id="mainUI" style="display:none;">
    <h2>Tester Panel</h2>

    <input type="text" id="ign" placeholder="IGN">

    <select id="tier">
        <option>LT5</option><option>HT5</option>
        <option>LT4</option><option>HT4</option>
        <option>LT3</option><option>HT3</option>
        <option>LT2</option><option>HT2</option>
        <option>LT1</option><option>HT1</option>
    </select>

    <select id="mode">
        <option value="sword">Sword</option>
        <option value="axe">Axe</option>
        <option value="potion">Potion</option>
        <option value="nethpot">NetherPot</option>
        <option value="crystal">Crystal</option>
        <option value="mace">Mace</option>
        <option value="bow">Bow</option>
        <option value="uhc">UHC</option>
        <option value="smp">SMP</option>
        <option value="diapot">DiaPot</option>
    </select>

    <button onclick="submitTier()">Submit</button>
    <div class="result" id="result"></div>
</div>

<script>
// -------- CONFIG --------
const PIN = "119806";

const tierPoints = {
    "LT5": 1, "HT5": 3, "LT4": 5, "HT4": 8,
    "LT3": 12, "HT3": 15, "LT2": 20, "HT2": 25,
    "LT1": 30, "HT1": 35
};

let players = [];

// -------- TOAST FUNCTION --------
function showToast(message, type) {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.className = "toast show " + type;

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2500);
}

// -------- LOGIN --------
function checkPin() {
    const input = document.getElementById("pin").value;

    if (input === PIN) {
        showToast("Logged In Successfully", "success");

        setTimeout(() => {
            document.getElementById("loginPopup").style.display = "none";
            document.getElementById("mainUI").style.display = "block";
        }, 500);

    } else {
        showToast("Password Incorrect", "error");
    }
}

// -------- SUBMIT --------
function submitTier() {
    const ign = document.getElementById("ign").value.trim();
    const tier = document.getElementById("tier").value;
    const mode = document.getElementById("mode").value;

    if (!ign) return;

    let player = players.find(p => p.name.toLowerCase() === ign.toLowerCase());

    if (!player) {
        player = { name: ign, rankTitle: "Wood", tiers: [] };
        players.push(player);
    }

    let existing = player.tiers.find(t => t.m === mode);

    if (existing) {
        existing.r = tier;
    } else {
        player.tiers.push({ m: mode, r: tier });
    }

    document.getElementById("result").innerText =
        `${ign} → ${mode} = ${tier} (${tierPoints[tier]} pts)`;

    showToast("Saved Successfully", "success");

    // -------- FIREBASE PLACEHOLDER --------
    /*
    // put your firebase here later
    */
}
</script>

</body>
</html>
