<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tester Panel</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b0b0f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.card{
    background:rgba(28,28,36,0.9);
    backdrop-filter: blur(10px);
    padding:30px;
    border-radius:18px;
    width:400px;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
    position:relative;
}

/* PING DOT */
.ping{
    position:absolute;
    top:15px;
    right:15px;
    width:12px;
    height:12px;
    border-radius:50%;
    background:red;
    box-shadow:0 0 10px red;
}

.ping.online{
    background:#22c55e;
    box-shadow:0 0 10px #22c55e;
}

/* INPUTS */
input,select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

input,select{
    background:#2a2a35;
    color:white;
}

/* BUTTON */
button{
    background:#5c5cff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}
button:hover{
    transform:translateY(-1px);
    opacity:0.9;
}

.plus-btn{
    background:#333;
}

/* MODE BOX */
.mode-box{
    background:#15151c;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    position:relative;
}

/* REMOVE BTN */
.remove{
    position:absolute;
    top:5px;
    right:8px;
    cursor:pointer;
    color:#ff4444;
    font-weight:bold;
}

/* TOAST */
.toast{
    position:fixed;
    right:20px;
    bottom:20px;
    padding:14px 18px;
    border-radius:10px;
    color:white;
    font-weight:bold;
    transform:translateX(120%);
    transition:0.35s;
}

.toast.show{
    transform:translateX(0);
}

.toast.red{background:#ff4444}
.toast.green{background:#22c55e}
</style>
</head>

<body>

<div class="card" id="loginCard">
    <div class="ping" id="ping"></div>

    <h2>Tester Login</h2>
    <input id="pin" maxlength="4" placeholder="Enter 4-digit PIN">
    <button onclick="login()">Login</button>
</div>

<div class="card hidden" id="panelCard">
    <div class="ping" id="ping2"></div>

    <h2>Upload Result</h2>

    <input id="ign" placeholder="IGN">

    <div id="modeContainer"></div>

    <button class="plus-btn" onclick="addGamemode()">+ Add Gamemode</button>
    <button onclick="submitAll()">Submit All</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDRJ9-AY5oy-oZ8ni5mWEYm2KWn72w1n3s",
    authDomain: "aitchison-tier-testing.firebaseapp.com",
    projectId: "aitchison-tier-testing"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔵 PING SYSTEM */
const ping = document.getElementById("ping");
const ping2 = document.getElementById("ping2");

onSnapshot(collection(db,"submissions"), ()=>{
    ping.classList.add("online");
    ping2.classList.add("online");
});

/* LOGIN */
const PIN = "1234";

function showToast(msg,color){
    const t = document.getElementById("toast");
    t.className = "toast " + color + " show";
    t.innerText = msg;
    setTimeout(()=>t.className="toast",2500);
}

window.login = () => {
    const pin = document.getElementById("pin").value;

    if(pin === PIN){
        showToast("Login Successful","green");
        loginCard.classList.add("hidden");
        panelCard.classList.remove("hidden");
        addGamemode();
    }else{
        showToast("Password Incorrect","red");
    }
};

/* ADD MODE */
window.addGamemode = () => {
    const box = document.createElement("div");
    box.className = "mode-box";

    box.innerHTML = `
        <div class="remove" onclick="this.parentElement.remove()">✖</div>

        <select class="mode">
            <option value="sword">Sword</option>
            <option value="axe">Axe</option>
            <option value="nethpot">Nethpot</option>
            <option value="crystal">Crystal</option>
            <option value="uhc">UHC</option>
            <option value="smp">SMP</option>
            <option value="diapot">DiaPot</option>
        </select>

        <select class="tier">
            <option>HT1</option>
            <option>HT2</option>
            <option>HT3</option>
            <option>HT4</option>
            <option>HT5</option>
            <option>LT1</option>
            <option>LT2</option>
            <option>LT3</option>
            <option>LT4</option>
            <option>LT5</option>
        </select>
    `;

    document.getElementById("modeContainer").appendChild(box);
};

/* POINTS */
const tierPoints = {
    "LT5":1,"HT5":3,"LT4":5,"HT4":8,"LT3":12,
    "HT3":15,"LT2":20,"HT2":25,"LT1":30,"HT1":35
};

function getRank(total){
    if(total >= 80) return "Iron";
    if(total >= 40) return "Stone";
    return "Wood";
}

/* SUBMIT */
window.submitAll = async () => {
    const ign = document.getElementById("ign").value.trim();
    if(!ign) return showToast("Enter IGN","red");

    const modes = document.querySelectorAll(".mode");
    const tiers = document.querySelectorAll(".tier");

    let usedModes = {};
    let totalPoints = 0;

    try{
        for(let i=0;i<modes.length;i++){
            const mode = modes[i].value;
            const tier = tiers[i].value;

            if(usedModes[mode]) continue; // prevent duplicates
            usedModes[mode] = true;

            const points = tierPoints[tier];
            totalPoints += points;

            await addDoc(collection(db,"submissions"),{
                ign,
                mode,
                tier,
                points,
                totalPoints,
                rank: getRank(totalPoints),
                time: serverTimestamp()
            });
        }

        showToast("Saved + Synced","green");

        document.getElementById("modeContainer").innerHTML="";
        document.getElementById("ign").value="";
        addGamemode();

    }catch(e){
        showToast("Save Failed","red");
    }
};
</script>

</body>
</html>
