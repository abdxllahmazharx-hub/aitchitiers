<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tester Panel</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b0b0f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1c1c24;
    padding:30px;
    border-radius:18px;
    width:380px;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

input,select{
    background:#2a2a35;
    color:white;
}

button{
    background:#5c5cff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{opacity:0.9}

.hidden{display:none}

.mode-box{
    background:#15151c;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}

.plus-btn{
    background:#333;
}

/* TOAST */
.toast{
    position:fixed;
    right:20px;
    bottom:20px;
    padding:14px 18px;
    border-radius:10px;
    color:white;
    font-weight:bold;
    transform:translateX(120%);
    transition:0.35s;
}

.toast.show{
    transform:translateX(0);
}

.toast.red{background:#ff4444}
.toast.green{background:#22c55e}

/* 🔵 PING DOT */
#pingDot{
    position:fixed;
    top:20px;
    left:20px;
    width:12px;
    height:12px;
    border-radius:50%;
    background:#22c55e;
    box-shadow:0 0 10px #22c55e;
}
</style>
</head>
<body>

<div id="pingDot"></div>

<div class="card" id="loginCard">
    <h2>Tester Login</h2>
    <input id="pin" maxlength="4" placeholder="Enter 4-digit PIN">
    <button onclick="login()">Login</button>
</div>

<div class="card hidden" id="panelCard">
    <h2>Upload Result</h2>

    <input id="ign" placeholder="IGN">

    <div id="modeContainer"></div>

    <button class="plus-btn" onclick="addGamemode()">+ Add Gamemode</button>
    <button onclick="submitAll()">Submit All</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDRJ9-AY5oy-oZ8ni5mWEYm2KWn72w1n3s",
    authDomain: "aitchison-tier-testing.firebaseapp.com",
    projectId: "aitchison-tier-testing"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PIN = "22010";

function showToast(msg,color){
    const toast = document.getElementById("toast");
    toast.className = "toast " + color + " show";
    toast.innerText = msg;

    setTimeout(()=>{
        toast.className = "toast";
    },2500);
}

window.login = () => {
    const pin = document.getElementById("pin").value;

    if(pin === PIN){
        showToast("Login Successful","green");
        document.getElementById("loginCard").classList.add("hidden");
        document.getElementById("panelCard").classList.remove("hidden");
        addGamemode();
    }else{
        showToast("Password Incorrect","red");
    }
};

window.addGamemode = () => {
    const box = document.createElement("div");
    box.className = "mode-box";

    box.innerHTML = `
        <select class="mode">
            <option value="sword">Sword</option>
            <option value="axe">Axe</option>
            <option value="nethpot">Nethpot</option>
            <option value="crystal">Crystal</option>
            <option value="uhc">UHC</option>
            <option value="smp">SMP</option>
            <option value="diapot">DiaPot</option>
        </select>

        <select class="tier">
            <option>HT1</option>
            <option>HT2</option>
            <option>HT3</option>
            <option>HT4</option>
            <option>HT5</option>
            <option>LT1</option>
            <option>LT2</option>
            <option>LT3</option>
            <option>LT4</option>
            <option>LT5</option>
        </select>
    `;

    document.getElementById("modeContainer").appendChild(box);
};

const tierPoints = {
    "LT5":1,"HT5":3,"LT4":5,"HT4":8,"LT3":12,
    "HT3":15,"LT2":20,"HT2":25,"LT1":30,"HT1":35
};

function getRank(total){
    if(total >= 80) return "Iron";
    if(total >= 40) return "Stone";
    return "Wood";
}

window.submitAll = async () => {
    const ign = document.getElementById("ign").value.trim();
    if(!ign) return showToast("Enter IGN","red");

    const modes = document.querySelectorAll(".mode");
    const tiers = document.querySelectorAll(".tier");

    let totalPoints = 0;
    let allData = [];

    for(let i=0;i<modes.length;i++){
        const mode = modes[i].value;
        const tier = tiers[i].value;
        const points = tierPoints[tier];

        totalPoints += points;

        allData.push({
            ign,
            mode,
            tier,
            points
        });
    }

    const rank = getRank(totalPoints);

    try{
        for(const entry of allData){
            await addDoc(collection(db,"submissions"),{
                ...entry,
                rank,
                totalPoints,
                time: serverTimestamp()
            });
        }

        showToast("Saved Successfully","green");

    }catch(e){
        showToast("Save Failed","red");
    }
};
</script>

<script>
/* 🔵 LIVE PING DOT */
const pingDot = document.getElementById("pingDot");

function updatePing(){
    if(navigator.onLine){
        pingDot.style.background = "#22c55e";
        pingDot.style.boxShadow = "0 0 10px #22c55e";
    }else{
        pingDot.style.background = "#ff4444";
        pingDot.style.boxShadow = "0 0 10px #ff4444";
    }
}

setInterval(updatePing, 1000);
updatePing();
</script>

</body>
</html>
