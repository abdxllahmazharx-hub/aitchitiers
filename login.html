<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
    body {
        margin:0;
        font-family: 'Inter', sans-serif;
        background:#0f0f0f;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .container {
        background:#1a1a1a;
        padding:30px;
        border-radius:12px;
        width:320px;
        box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
        text-align:center;
        margin-bottom:20px;
    }

    input {
        width:100%;
        padding:12px;
        margin-bottom:10px;
        border:none;
        border-radius:6px;
        background:#2a2a2a;
        color:white;
        box-sizing: border-box;
    }

    button {
        width:100%;
        padding:12px;
        border:none;
        border-radius:6px;
        background:#5865F2;
        color:white;
        font-weight:bold;
        cursor:pointer;
        margin-top:10px;
        transition: 0.2s;
    }

    button:hover { opacity: 0.9; }

    .google-btn {
        background:white;
        color:black;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:10px;
    }

    .google-btn img {
        width:18px;
    }

    .link {
        margin-top:15px;
        text-align:center;
        font-size:14px;
    }

    .link a {
        color:#5865F2;
        text-decoration:none;
    }

    /* POPUP STYLES */
    .popup {
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.85);
        display:none;
        justify-content:center;
        align-items:center;
        z-index: 9999;
    }

    .popup-box {
        background:#1a1a1a;
        padding:30px;
        border-radius:15px;
        width:320px;
        text-align:center;
        border: 1px solid #333;
    }

    .pfp {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 20px 0;
    }

    .pfp-option {
        text-align: center;
        cursor: pointer;
    }

    .pfp img {
        width:70px;
        height:70px;
        border-radius:10px;
        border:3px solid transparent;
        transition: 0.2s;
        background: #000;
    }

    .pfp img.selected {
        border-color: #5865F2;
        transform: scale(1.05);
    }

    .pfp-label {
        font-size: 12px;
        margin-top: 5px;
        color: #aaa;
        display: block;
    }

    .warning-text {
        font-size: 13px;
        color: #ffcc00;
        margin-bottom: 15px;
        font-weight: 600;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="emailLogin()">Login</button>

    <button class="google-btn" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
        Sign in with Google
    </button>

    <div class="link">
        Don’t have an account? <a href="sign.html">Create Account</a>
    </div>
</div>

<div class="popup" id="setupPopup">
    <div class="popup-box">
        <h3 style="margin-bottom:10px;">Setup Profile</h3>

        <p class="warning-text">
            ⚠️ Enter your REAL / MAIN Minecraft Username
        </p>

        <input id="mcname" placeholder="Minecraft Username">

        <p style="font-size:14px; margin-top:15px;">Choose Character</p>
        <div class="pfp">
            <div class="pfp-option" onclick="selectPFP(this,'steve')">
                <img src="https://mc-heads.net/avatar/Steve" class="selected">
                <span class="pfp-label">Steve</span>
            </div>

            <div class="pfp-option" onclick="selectPFP(this,'alex')">
                <img src="https://mc-heads.net/avatar/Alex">
                <span class="pfp-label">Alex</span>
            </div>
        </div>

        <button onclick="saveProfile()" style="background:#43b581;">Finish Setup</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getAuth,
    signInWithPopup,
    GoogleAuthProvider,
    signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    collection,
    query,
    where,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDRJ9-AY5oy-oZ8ni5mWEYm2KWn72w1n3s",
    authDomain: "aitchison-tier-testing.firebaseapp.com",
    projectId: "aitchison-tier-testing",
    storageBucket: "aitchison-tier-testing.firebasestorage.app",
    messagingSenderId: "206635171971",
    appId: "1:206635171971:web:5c7b4aad54adca55c85bb6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let selectedPFP = "steve";
let currentUser = null;

/* LOGIN */
window.emailLogin = async () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    try {
        const userCred = await signInWithEmailAndPassword(auth, email, pass);
        checkUser(userCred.user);
    } catch (e) {
        alert(e.message);
    }
};

/* GOOGLE */
window.googleLogin = async () => {
    try {
        const result = await signInWithPopup(auth, provider);
        checkUser(result.user);
    } catch (e) {
        alert(e.message);
    }
};

/* CHECK USER */
async function checkUser(user) {
    currentUser = user;

    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        document.getElementById("setupPopup").style.display = "flex";
    } else {
        window.location.href = "index.html";
    }
}

/* PFP SELECTION */
window.selectPFP = (el, type) => {
    document.querySelectorAll(".pfp img").forEach(i => i.classList.remove("selected"));
    el.querySelector("img").classList.add("selected");
    selectedPFP = type;
};

/* SAVE TO FIRESTORE */
window.saveProfile = async () => {
    const name = document.getElementById("mcname").value.trim();

    if (!name) return alert("Please enter your Minecraft username!");

    try {
        await setDoc(doc(db, "users", currentUser.uid), {
            name: name,
            pfp: selectedPFP
        });

        window.location.href = "index.html";
    } catch (e) {
        alert("Error saving profile: " + e.message);
    }
};
</script>

</body>
</html>
